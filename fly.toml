app = "life-os-bot"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "./life-os-migrate up"
  release_command_timeout = "5m"
  strategy = "rolling"

[env]
  APP_TIMEZONE = "Asia/Ho_Chi_Minh"
  GOOGLE_CALENDAR_ID = "primary"
  HTTP_ADDR = ":8080"
  # Set CALENDAR_OWNER_TELEGRAM_ID as a secret when enabling Google Calendar.
  # Set GOOGLE_OAUTH_REDIRECT_URL to https://<app-name>.fly.dev/oauth/google/callback for per-user calendars.
  MIGRATIONS_SOURCE = "file:///app/migrations"
  AUTONOMY_SCHEDULER_ENABLED = "true"
  AUTONOMY_DEFAULT_ENABLED = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[processes]
  app = "./life-os-bot"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
