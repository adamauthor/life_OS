# fly.toml app configuration file generated for life-os-friday on 2026-05-23T13:55:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'life-os-friday'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = './life-os-migrate up'
  release_command_timeout = '5m0s'

[env]
  APP_TIMEZONE = 'Asia/Ho_Chi_Minh'
  AUTONOMY_DEFAULT_ENABLED = 'false'
  AUTONOMY_SCHEDULER_ENABLED = 'true'
  GOOGLE_CALENDAR_ID = 'primary'
  HTTP_ADDR = ':8080'
  MIGRATIONS_SOURCE = 'file:///app/migrations'

[processes]
  app = './life-os-bot'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
