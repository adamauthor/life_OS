name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Format, Vet, Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))"
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go.mod and go.sum
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit tests with race detector
        run: go test -race ./...

      - name: Build Go packages
        run: go build ./...

  postgres-integration:
    name: Migrations And Postgres Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: life_os
          POSTGRES_USER: life_os
          POSTGRES_PASSWORD: life_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U life_os -d life_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://life_os:life_os@localhost:5432/life_os?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run migrations
        run: go run ./cmd/migrate up

      - name: Check migration version
        run: go run ./cmd/migrate version

      - name: Run storage integration tests
        run: go test ./internal/storage -run TestMemoryRepositoryCreateMemoryIntegration -count=1

      - name: Verify latest down migration and re-apply
        run: |
          go run ./cmd/migrate steps -1
          go run ./cmd/migrate up

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - checks
      - postgres-integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t life-os-bot:${{ github.sha }} .

  deploy:
    name: Deploy To Fly
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.FLY_DEPLOY_ENABLED == 'true')
    concurrency:
      group: fly-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Show Fly status
        run: flyctl status
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
