services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: life_os_postgres
    environment:
      POSTGRES_DB: life_os
      POSTGRES_USER: life_os
      POSTGRES_PASSWORD: life_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life_os -d life_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
